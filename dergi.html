<!doctype html>
<html lang="tr">
<head>

<title>Hakikat Dergisi Yerel Arşiv Okuyucu v4</title>
<style>
:root{--bg:#07101f;--panel:#0d1728;--panel2:#13223a;--line:#263b5f;--txt:#edf5ff;--muted:#9fb1c8;--brand:#43ddcd;--gold:#ffc64b;--red:#a9405a;--green:#29c27f;--blue:#29406d}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#142946 0,#07101f 48%,#050914 100%);color:var(--txt);font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial}.app{height:100vh;display:grid;grid-template-columns:350px 390px 1fr;overflow:hidden}.side,.middle,.reader{min-width:0;border-right:1px solid var(--line);background:rgba(8,16,30,.72);backdrop-filter:blur(10px)}.head{padding:18px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#ffd45d,#ff892f);display:grid;place-items:center;color:#111;font-weight:900}.title h1{font-size:19px;margin:0}.title p{margin:3px 0 0;color:var(--muted);font-size:13px}.tools{padding:14px;display:grid;gap:10px}.row{display:flex;gap:8px}.inp,.sel{width:100%;border:1px solid var(--line);background:#091326;color:var(--txt);border-radius:14px;padding:12px}.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:800;color:#06101e;background:var(--gold);cursor:pointer}.btn.secondary{background:#233a66;color:white}.btn.play{background:var(--brand);color:#041316}.btn.stop{background:var(--red);color:white}.btn:disabled{opacity:.45;cursor:not-allowed}.hint{margin:0 14px 14px;padding:12px;border:1px dashed #916f18;border-radius:14px;color:#ffe596;background:#17170d;font-size:12px}.list{height:calc(100vh - 150px);overflow:auto;padding:0 14px 18px;scrollbar-width:auto}.issue{display:grid;grid-template-columns:58px 1fr;gap:12px;padding:13px;border:1px solid transparent;border-radius:16px;margin:8px 0;background:#111a2d;cursor:pointer}.issue:hover,.issue.active{border-color:var(--gold);background:#182640}.coverMini{height:92px;border-radius:10px;background:linear-gradient(150deg,#233d67,#111827);border:1px solid var(--line);display:grid;place-items:center;color:var(--gold);font-weight:900;overflow:hidden;padding:3px}.coverMini img{width:100%;height:100%;object-fit:contain;border-radius:7px;display:block;background:#07101f}.issue b{display:block}.issue small{color:var(--muted)}.issueProgress{grid-column:1/3;height:7px;background:#0a1222;border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-top:2px}.issueProgress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--gold))}.issuePct{font-size:10px;color:var(--gold);margin-top:4px}.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.chip{font-size:10px;padding:4px 7px;border-radius:999px;background:#213452;color:#c6d6ee}.middle{overflow:auto}.issueView{padding:18px}.bigCover{width:100%;min-height:360px;max-height:calc(100vh - 310px);aspect-ratio:3/4;border-radius:24px;background:linear-gradient(160deg,#1c3760,#070d19);border:1px solid var(--line);display:grid;place-items:center;text-align:center;box-shadow:0 18px 45px rgba(0,0,0,.3);overflow:hidden;padding:10px}.bigCover img{width:100%;height:100%;object-fit:contain;object-position:center;background:#07101f;border-radius:18px;display:block}.bigCover .fallback{font-size:34px;font-weight:900;color:var(--gold)}.meta{display:flex;gap:10px;margin:14px 0}.stat{flex:1;background:#15223a;border:1px solid var(--line);border-radius:14px;padding:10px}.stat small{color:var(--gold);display:block}.sectionTitle{font-size:18px;margin:18px 0 10px}.article{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101b2f;margin:8px 0;cursor:pointer}.article:hover,.article.active{border-color:var(--brand);background:#142741}.article b{display:block}.article small{color:var(--muted)}.reader{display:grid;grid-template-rows:auto minmax(0,1fr);height:100vh;overflow:hidden}.topbar{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;justify-content:space-between}.rtitle{min-width:0}.rtitle h2{margin:0;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rtitle p{margin:3px 0 0;color:var(--muted);font-size:12px}.controls{display:flex;gap:8px;align-items:center}.voice{max-width:230px}.progress{width:140px;height:8px;border:1px solid var(--line);border-radius:99px;overflow:hidden}.bar{height:100%;background:var(--brand);width:0}.content{overflow-y:scroll;overflow-x:hidden;padding:26px 34px 90px;height:100%;scrollbar-width:auto;overscroll-behavior:contain}.empty{height:100%;display:grid;place-items:center;text-align:center;color:#a9c6ef}.sentence{font-size:20px;line-height:1.75;margin:0 0 13px;padding:9px 12px;border-radius:14px;color:#e8f1ff}.sentence.done{color:#8c9ab1}.sentence.active{background:linear-gradient(90deg,rgba(255,198,75,.28),rgba(67,221,205,.1));outline:1px solid rgba(255,198,75,.5);color:white}.sentence.next{color:#dcecff}.load{position:fixed;inset:auto 20px 20px auto;background:#111a2d;border:1px solid var(--line);padding:12px 15px;border-radius:14px;color:#dbe8ff;box-shadow:0 15px 40px rgba(0,0,0,.4)}.app.catalog{grid-template-columns:350px 1fr}.app.catalog .reader{display:none}.app.catalog .middle{display:block}.backList{background:#1e355e;color:white}@media(max-width:1150px){.app{grid-template-columns:330px 1fr}.middle{display:none}}@media(max-width:720px){html,body{height:100%;overflow:hidden}.app{height:100dvh;display:block;overflow:auto;-webkit-overflow-scrolling:touch}.side,.middle,.reader{height:auto;border-right:0}.list{height:360px;-webkit-overflow-scrolling:touch}.middle{display:block}.bigCover{min-height:380px;max-height:none;aspect-ratio:3/4}.reader{min-height:650px}.topbar{display:grid}.controls{flex-wrap:wrap}.content{padding:18px;-webkit-overflow-scrolling:touch;touch-action:pan-y}.sentence{font-size:18px}.app.reading{height:100dvh;overflow:hidden}.app.reading .side,.app.reading .middle{display:none!important}.app.reading .reader{display:grid;grid-template-rows:auto minmax(0,1fr);height:100dvh;min-height:0;overflow:hidden;border-right:0}.app.reading .topbar{position:sticky;top:0;z-index:50;background:rgba(7,16,31,.96);backdrop-filter:blur(10px);box-shadow:0 8px 22px rgba(0,0,0,.35);padding:9px 10px;gap:8px}.app.reading .rtitle h2{font-size:15px;max-width:100%}.app.reading .rtitle p{font-size:11px}.app.reading .controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;align-items:center}.app.reading .controls .btn{padding:9px 6px;font-size:12px;border-radius:11px}.app.reading .voice{grid-column:1/3;max-width:none;width:100%;min-width:0}.app.reading #rateSel{grid-column:3;width:100%!important}.app.reading .progress{grid-column:4;width:100%;height:7px}.app.reading #count{grid-column:1/5;text-align:center;font-size:12px;color:var(--muted)}.app.reading .content{height:auto;min-height:0;overflow-y:auto!important;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:16px 14px 120px}.app.reading .sentence{font-size:18px;line-height:1.65;margin-bottom:10px}.app.catalog .reader{display:none}.app.catalog .side,.app.catalog .middle{display:block}}
</style>
</head>
<body>
<div id="app" class="app catalog">
<aside class="side">
  <div class="head"><div class="logo">H</div><div class="title"><h1>Hakikat Dergisi</h1><p>Kapak, sayı, konu, makale ve sesli okuma.</p></div></div>
  <div class="tools">
    <div class="row"><input id="q" class="inp" placeholder="Sayı, tarih, konu ara..."><button id="fetchBtn" class="btn">Yenile</button></div>
  </div>
  <div id="issueList" class="list"></div>
</aside>
<section class="middle"><div id="issueView" class="issueView"><div class="empty"><div><h2>Yerel arşiv yükleniyor...</h2><p>data/index.json dosyası varsa sayılar otomatik gelir.</p></div></div></div></section>
<main class="reader">
  <div class="topbar">
    <div class="rtitle"><h2 id="readerTitle">Dergi seçiniz</h2><p id="readerSub">Makale seçildiğinde cümleler burada açılır.</p></div>
    <div class="controls"><button id="listBtn" class="btn secondary">📚 Listeye Dön</button><button id="prevBtn" class="btn secondary">◀ Geri</button><button id="nextBtn" class="btn secondary">İleri ▶</button><button id="playBtn" class="btn play">Sesli Oku</button><button id="stopBtn" class="btn stop">Durdur</button><select id="voiceSel" class="sel voice"></select><select id="rateSel" class="sel" style="width:90px"><option value="0.8">0.8x</option><option value="1" selected>1x</option><option value="1.15">1.15x</option><option value="1.3">1.3x</option></select><div class="progress"><div id="bar" class="bar"></div></div><span id="count">0/0</span></div>
  </div>
  <div id="content" class="content"><div class="empty"><div><h2>Okuma ekranı hazır.</h2><p>Soldan sayı, ortadan makale seçin.</p></div></div></div>
</main>
</div>
<div id="toast" class="load" style="display:none"></div>
<script>
const BASE='https://www.hakikat.com';
const DATA_KEY='hakikat_reader_data_local_v1';
const PROGRESS_KEY='hakikat_reader_progress_v11';
const STATIC_DATA_URL='data/index.json';
async function loadIssueJson(issue){
  if(issue.articles && issue.articles.length) return issue;
  if(!issue.contentFile) return issue;
  const r=await fetch(issue.contentFile+'?v='+Date.now(),{cache:'no-store'});
  if(!r.ok) throw new Error(issue.contentFile+' okunamadı');
  const d=await r.json();
  Object.assign(issue,d);
  issue.url=issue.url||slugIssue(issue.no);
  issue.cover=issue.cover||d.cover||knownCover(issue.no)||'';
  return issue;
}
const COVER_FALLBACKS={
  393:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-393-kapak-haki-72846771-66fd-4027-930f-1a01d4c53e10.jpg',
  392:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-392-kapak-tera-9289f36f-a2c8-4bbf-82f6-bf4b8d3c9823.jpg',
  391:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-391-kapak-iran-45ed5ad6-7dde-4657-8c7a-3b3aed55e3ee.jpg',
  390:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-390-kapak-ulvi-d236422d-9266-49f5-a4b0-eda67fd5572b.jpg',
  389:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-389-kapak-insa-54d30582-d642-4d78-aecf-2f78268019e5.jpg',
  388:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-388-kapak-hate-a9a5ee6f-5a1a-4704-92fc-8797a457b456.jpg'
};
function knownCover(no){return COVER_FALLBACKS[String(no)]||COVER_FALLBACKS[Number(no)]||''}
const state={issues:[],issue:null,articles:[],article:null,sentences:[],idx:0,playing:false,voices:[],progress:{}};
const $=id=>document.getElementById(id);
function toast(t){$('toast').textContent=t;$('toast').style.display='block';clearTimeout(window._tt);window._tt=setTimeout(()=>$('toast').style.display='none',3500)}
function urlFor(u){return 'https://r.jina.ai/http://'+u.replace(/^https?:\/\//,'')}
function htmlProxyUrls(u){return [
  // Kapak linkini bulmak için önce Jina kullanılmalı. AllOrigins/Codetabs sık zaman aşımına düşüyor.
  'https://r.jina.ai/http://'+u.replace(/^https?:\/\//,''),
  'https://r.jina.ai/http://r.jina.ai/http://'+u.replace(/^https?:\/\//,'')
]}
async function fetchWithTimeout(u,ms=12000){
  const ac=new AbortController(); const t=setTimeout(()=>ac.abort(),ms);
  try{return await fetch(u,{cache:'no-store',signal:ac.signal})}finally{clearTimeout(t)}
}
async function fetchAnyText(urls){let last;for(const u of urls){try{let r=await fetchWithTimeout(u,12000);if(r.ok){let t=await r.text();if(t&&t.length>200)return t}}catch(e){last=e}}throw last||new Error('proxy okunamadı')}
function normalizeImageUrl(u){
  u=absUrl((u||'').replace(/&amp;/g,'&').trim());
  return u.replace(/\)+$/,'');
}
function extractCoverMap(txt){
  const map={}; txt=txt||'';
  // Hakikat listesinde kapak linki genellikle "Büyüt" bağlantısıdır:
  // https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-393-kapak-....jpg
  const re=/https?:\/\/[^\s"'()<>]+hakikat-dergisi-(\d{1,3})-kapak[^\s"'()<>]*?\.(?:jpg|jpeg|png|webp)(?:\?[^\s"'()<>]*)?/gi;
  let m;
  while((m=re.exec(txt))){ map[String(+m[1])]=normalizeImageUrl(m[0]); }
  return map;
}
function candidateCoverUrls(no){return [
  `${BASE}/Upload/Dosyalar/resim-jpg/hakikat-dergisi-${no}-kapak.jpg`,
  `${BASE}/Upload/Dosyalar/resim-jpg/hakikat-dergisi-${no}.jpg`,
  `${BASE}/Upload/Dosyalar/resim-jpg/${no}-sayi.jpg`
]}
async function getText(u){let r=await fetch(urlFor(u),{cache:'no-store'});if(!r.ok)throw new Error('Bağlantı hatası: '+r.status);return await r.text()}
async function getTextWithMode(u,mode){
  return await getText(u);
}
async function findCoverFromHtml(issue){
  // Kapak resmi metin proxy ile bulunur; resmin kendisi doğrudan <img src> ile yüklenir.
  try{
    const html=await fetchAnyText(htmlProxyUrls(issue.url));
    const found=[];
    const imgRe=/<img\b[^>]*?(?:src|data-src)=["']([^"']+)["'][^>]*>/gi;
    let m;
    while((m=imgRe.exec(html))){
      const tag=m[0]; const src=absUrl(m[1]);
      if(!src) continue;
      const hay=(tag+' '+src).toLowerCase();
      if(hay.includes('hakikat-dergisi') || hay.includes('kapak') || hay.includes(String(issue.no))) found.push(src);
    }
    for(const mm of html.matchAll(/https?:\/\/[^\s"'()<>]+\.(?:jpg|jpeg|png|webp)(?:\?[^\s"'()<>]*)?/gi)){
      const src=absUrl(mm[0]); const low=src.toLowerCase();
      if(low.includes('hakikat-dergisi') || low.includes('kapak') || src.includes(String(issue.no))) found.push(src);
    }
    const uniq=[...new Set(found)];
    return uniq.find(x=>x.toLowerCase().includes('kapak')&&x.includes(String(issue.no)))
        || uniq.find(x=>x.includes(String(issue.no)))
        || uniq.find(x=>x.toLowerCase().includes('kapak'))
        || uniq[0] || '';
  }catch(e){return ''}
}
function clean(s){return (s||'').replace(/\s+/g,' ').replace(/\[([^\]]+)\]\([^\)]+\)/g,'$1').replace(/[*_#>`]/g,'').trim()}
function splitSentences(txt){return clean(txt).replace(/([.!?…])\s+(?=[A-ZÇĞİÖŞÜÂÎÛ0-9“\"])/g,'$1|').split('|').map(x=>x.trim()).filter(x=>x.length>12)}
function slugIssue(n){return BASE+'/hakikat-dergisi/'+n+'-sayi'}
function monthYear(t){let m=(t.match(/,\s*([^\n]+?\s+\d{4})/)||[])[1]||'';return clean(m)}
function parseIssueList(txt){
  const coverMap=extractCoverMap(txt);
  let re=/(\d{1,3})\.SAYI,\s*([A-Za-zÇĞİÖŞÜçğıöşü]+\s+\d{4})/g,arr=[],seen=new Set(),m;
  while((m=re.exec(txt))){
    let no=+m[1];
    if(no>=1&&!seen.has(no)){
      seen.add(no);
      arr.push({no,date:m[2],title:`${no}.SAYI, ${m[2]}`,url:slugIssue(no),topics:[],cover:coverMap[String(no)]||knownCover(no)||''});
    }
  }
  return arr.sort((a,b)=>b.no-a.no)
}
function absUrl(u){if(!u)return '';u=u.replace(/&amp;/g,'&').trim();if(u.startsWith('//'))return 'https:'+u;if(u.startsWith('/'))return BASE+u;if(u.startsWith('http://'))return u.replace('http://','https://');return u}
function extractCover(md,issue){
  let candidates=[]; const no=String(issue.no);
  // Jina metninde şu yapı geliyor: [Image: Hakikat Dergisi 392.SAYI](https://...jpg?format=webx...)
  // Query string içinde parantez yoksa tamamı alınır; &amp; temizlenir.
  const imgLink=/\[[^\]]*(?:Image|Resim|kapak|Hakikat Dergisi|SAYI)[^\]]*\]\((https?:\/\/[^\s)]+?\.(?:jpg|jpeg|png|webp)(?:\?[^\s)]*)?)\)/gi;
  for(const m of md.matchAll(imgLink)) candidates.push(m[1]);
  const mdImg=/!\[[^\]]*\]\((https?:\/\/[^\s)]+?\.(?:jpg|jpeg|png|webp)(?:\?[^\s)]*)?)\)/gi;
  for(const m of md.matchAll(mdImg)) candidates.push(m[1]);
  const direct=/https?:\/\/[^\s"'<>]+?\.(?:jpg|jpeg|png|webp)(?:\?[^\s"'<>]*)?/gi;
  for(const m of md.matchAll(direct)) candidates.push(m[0]);
  candidates=[...new Set(candidates.map(normalizeImageUrl).filter(Boolean))];
  return candidates.find(x=>x.toLowerCase().includes('kapak') && x.includes(no))
    || candidates.find(x=>x.toLowerCase().includes('hakikat-dergisi') && x.includes(no))
    || candidates.find(x=>x.toLowerCase().includes('kapak'))
    || candidates.find(x=>x.includes(no))
    || candidates[0] || '';
}
function isReferenceTitle(l){return /^\(?[A-Za-zÇĞİÖŞÜçğıöşüÂÎÛâîû'’\-\s]+:\s*\d+[\-–]?\d*\)?$/.test(l.trim())}
function stripSiteNoise(lines){
  const bad=/^(Title:|URL Source:|Markdown Content:|Hakikat Yayıncılık|ÖMER ÖNGÜT|HAKİKAT YAYINCILIK|HAKİKAT DERGİSİ|HAKİKAT MEDYA|HAKİKAT KIRTASİYE|HAKİKAT TAKVİMLERİ|Arama Yap|HAKKIMIZDA|DUYURULAR|YABANCI DİLDEKİ|KÜNYE|TEMSİLCİLİKLERİMİZ|KIRTASİYE BAYİLERİMİZ|İLETİŞİM|Ana Sayfa|Büyüt|Önceki \d+\.SAYI|Sonraki \d+\.SAYI|SAYFAYA DEVAM|Yazar Seçiniz|Sayı Seçiniz|Tüm Sayılar)$/i;
  return lines.map(clean).filter(l=>l && !bad.test(l) && !/^Image:/i.test(l) && !/^\* \* \*$/.test(l));
}
function parseIssuePage(md,issue){
  let rawLines=md.split(/\n+/).map(x=>x.trim()).filter(Boolean);
  let lines=stripSiteNoise(rawLines);
  let title=`${issue.no}.SAYI, ${issue.date}`;
  let cover=issue.cover||extractCover(md,issue)||knownCover(issue.no)||'';

  // Orta bölüm metin parçalamaz: her sayı tek ana metin olarak tutulur.
  let contentStart=0;
  let ownTitleIndex=lines.findIndex(l=>new RegExp('^'+issue.no+'\\.SAYI','i').test(l));
  let besmeleIndex=lines.findIndex(l=>/Bismillahirrahmanirrahim/i.test(l));
  if(ownTitleIndex>=0) contentStart=ownTitleIndex+1;
  if(besmeleIndex>=0) contentStart=Math.min(contentStart||besmeleIndex, besmeleIndex);

  let bodyLines=lines.slice(contentStart).filter(l=>{
    if(/^Hakikat \d+\. Sayı/i.test(l)) return false;
    if(/^Başyazı ve Makaleler$/i.test(l)) return false;
    if(/^Başyazıyı Oku$/i.test(l)) return false;
    if(/^Başyazı$/i.test(l)) return false;
    if(/^İsmail Yavuz$/i.test(l)) return false;
    if(/^https?:\/\//i.test(l)) return false;
    return true;
  });
  let fullText=bodyLines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
  if(!fullText) fullText=lines.join('\n');
  let mainTitle=`${issue.no}.SAYI, ${issue.date}`;
  let articles=[{title:mainTitle,text:fullText,kind:'full'}];
  return {...issue,title:mainTitle,cover,topics:[mainTitle],articles,raw:md};
}
function renderIssues(){let q=$('q').value.toLowerCase().trim();let list=state.issues.filter(x=>!q||(`${x.no} ${x.date} ${x.title} ${(x.topics||[]).join(' ')}`).toLowerCase().includes(q));$('issueList').innerHTML=list.map(x=>{let pr=state.progress[x.no]||{};let total=pr.total||0, idx=pr.idx||0;let pct=total?Math.min(100,Math.round(((idx+1)/total)*100)):0;return `<div class="issue ${state.issue&&state.issue.no===x.no?'active':''}" onclick="loadIssue(${x.no})"><div class="coverMini">${x.cover?`<img src="${x.cover}" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:contain;border-radius:7px;background:#07101f" onerror="this.parentElement.textContent='${x.no}'">`:x.no}</div><div><b>${x.title}</b><small>${x.date}</small><div class="chips">${(x.topics||[]).slice(0,3).map(t=>`<span class="chip">${t}</span>`).join('')}</div><div class="issuePct">${total?`Okuma: %${pct} · ${Math.min(idx+1,total)}/${total}`:'Henüz okunmadı'}</div></div><div class="issueProgress"><i style="width:${pct}%"></i></div></div>`}).join('')||'<p class="hint">Sonuç yok.</p>'}
function renderIssue(){
  let x=state.issue;if(!x)return;
  const coverHtml=x.cover
    ? `<img src="${x.cover}" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<div class=\'fallback\'>${x.no}<br><small>${x.date}</small><br><small>Kapak yüklenemedi</small></div>'">`
    : `<div class="fallback">${x.no}<br><small>${x.date}</small><br><small>Kapak aranıyor / bulunamadı</small></div>`;
  const readCount=splitSentences((x.articles&&x.articles[0]?x.articles[0].text:'')).length;
  $('issueView').innerHTML=`
    <div class="bigCover">${coverHtml}</div>
    <div class="meta">
      <div class="stat"><small>Sayı</small><b>${x.no}</b></div>
      <div class="stat"><small>Tarih</small><b>${x.date}</b></div>
      <div class="stat"><small>Okuma</small><b>${readCount}</b></div>
    </div>
    <button class="btn play" style="width:100%;margin:4px 0 12px" onclick="selectArticle(0)">Ana metni oku ▶</button>
    <h3 class="sectionTitle">Konular</h3>
    <div class="article active" onclick="selectArticle(0)">
      <b>${(x.articles&&x.articles[0]?x.articles[0].title:x.title)||'Ana metin'}</b>
      <small>Bu derginin metni sağdaki okuma ekranında tek akış halinde açılır. Orta bölümde metin parçalanmaz.</small>
    </div>`;
}
function scrollActiveSentence(){let c=$('content'),el=$('s'+state.idx);if(!c||!el)return;let top=el.offsetTop-(c.clientHeight/2)+(el.clientHeight/2);c.scrollTo({top:Math.max(0,top),behavior:'smooth'});}function renderContent(){let s=state.sentences;$('count').textContent=s.length?`${state.idx+1}/${s.length}`:'0/0';$('bar').style.width=s.length?((state.idx+1)/s.length*100)+'%':'0';if(!s.length){$('content').innerHTML='<div class="empty"><div><h2>Makale seçiniz.</h2></div></div>';return}$('content').innerHTML=s.map((x,i)=>`<p id="s${i}" class="sentence ${i<state.idx?'done':i===state.idx?'active':'next'}">${x}</p>`).join('');requestAnimationFrame(scrollActiveSentence);saveProgress();}
function persistProgress(){try{localStorage.setItem(PROGRESS_KEY,JSON.stringify(state.progress));}catch(e){}}
function saveProgress(){if(!state.issue||!state.sentences.length)return;state.progress[String(state.issue.no)]={idx:state.idx,total:state.sentences.length,title:state.issue.title||'',at:Date.now()};persistProgress();renderIssues()}
function loadProgress(){state.progress={};const keys=[PROGRESS_KEY,'hakikat_reader_progress_v10','hakikat_reader_progress_v8','hakikat_reader_progress_v7','hakikat_reader_progress_v6'];for(const k of keys){try{const d=JSON.parse(localStorage.getItem(k)||'{}')||{};state.progress={...d,...state.progress};}catch(e){}}}
function mergeIssuesFresh(fresh){const old=new Map((state.issues||[]).map(x=>[x.no,x]));return fresh.map(x=>{const o=old.get(x.no)||{};return {...o,...x,cover:x.cover||o.cover||knownCover(x.no)||'',articles:o.articles||x.articles||null,raw:o.raw||''};});}
async function loadStaticIndex(){
  const r=await fetch(STATIC_DATA_URL+'?v=' + Date.now(),{cache:'no-store'});
  if(!r.ok) throw new Error('data/index.json bulunamadı');
  const d=await r.json();
  const issues=(d.issues||[]).map(x=>({...x,no:Number(x.no),url:x.url||slugIssue(x.no),cover:x.cover||x.localCover||knownCover(x.no)||'',contentFile:x.contentFile||('data/'+x.no+'.json')}));
  if(!issues.length) throw new Error('data/index.json boş');
  state.issues=mergeIssuesFresh(issues);
  loadProgress();saveLocal();renderIssues();
  toast('Yerel JSON yüklendi: '+issues.length+' sayı. Kapaklar JSON’dan geliyor.');
  return true;
}
async function loadAll(){
  try{
    toast('Yerel data/index.json aranıyor...');
    await loadStaticIndex();
    return;
  }catch(e){
    loadProgress();
    loadLocal();
    $('issueView').innerHTML='<div class="empty"><div><h2>Yerel veri bulunamadı.</h2><p>Önce bilgisayarda <b>guncelle.bat</b> çalıştırın. Sonra oluşan <b>data</b> ve <b>kapaklar</b> klasörlerini GitHub’a yükleyin.</p></div></div>';
    toast('data/index.json bulunamadı veya boş. guncelle.bat çalıştırılmalı.');
  }
}
async function loadIssue(no){
  let issue=state.issues.find(x=>Number(x.no)===Number(no));if(!issue)return;
  issue.url=issue.url||slugIssue(no);
  stop();state.issue=issue;state.article=null;state.sentences=[];state.idx=0;
  renderIssues();renderIssue();
  $('readerTitle').textContent=`${issue.no}.SAYI, ${issue.date}`;
  $('readerSub').textContent='İçerik yükleniyor...';
  $('content').innerHTML='<div class="empty"><div><h2>İçerik yükleniyor...</h2><p>Yerel arşiv dosyası okunuyor.</p></div></div>';
  try{
    if(issue.contentFile || (issue.articles&&issue.articles.length)){
      await loadIssueJson(issue);
      state.issue=issue;
      renderIssues();renderIssue();saveLocal();selectArticle(0);
      toast('Yerel içerik hazır.');
      return;
    }
    toast(no+'. sayı internetten çekiliyor...');
    let md=await getText(issue.url);
    let full=parseIssuePage(md,issue);
    if(!full.cover){toast('Kapak resmi aranıyor...'); full.cover=knownCover(no)||await findCoverFromHtml(issue);}
    Object.assign(issue,full);state.issue=issue;
    renderIssues();renderIssue();saveLocal();selectArticle(0);
    toast('İçerik hazır.');
  }catch(e){
    state.article=null;state.sentences=[];renderIssue();
    $('readerTitle').textContent=`${issue.no}.SAYI, ${issue.date}`;
    $('readerSub').textContent='Çekilemedi';
    $('content').innerHTML='<div class="empty"><div><h2>Bu sayı açılamadı</h2><p>Önce bilgisayarda guncelle.bat çalıştırıp data dosyalarını üretin. Hata: '+String(e.message||e)+'</p></div></div>';
    toast('Sayı açılamadı: '+e.message);
  }
}
function selectArticle(i){state.article=i;let a=state.issue.articles[i];state.sentences=splitSentences(a.text);let saved=state.progress[state.issue.no];state.idx=(saved&&saved.total===state.sentences.length)?Math.min(saved.idx,state.sentences.length-1):0;$('readerTitle').textContent=a.title;$('readerSub').textContent=state.issue.title+' • '+state.sentences.length+' cümle';renderIssue();renderContent();showReaderScreen();}
function next(){if(state.idx<state.sentences.length-1){state.idx++;renderContent();}}
function prev(){if(state.idx>0){state.idx--;renderContent();}}

function showListScreen(){stop();$('app').classList.add('catalog');$('app').classList.remove('reading');window.scrollTo({top:0,left:0,behavior:'smooth'});let list=$('issueList');if(list)list.scrollIntoView({block:'start',behavior:'smooth'});}
function showReaderScreen(){$('app').classList.remove('catalog');$('app').classList.add('reading');window.scrollTo({top:0,left:0,behavior:'smooth'});}
function speakCurrent(){if(!state.sentences.length)return;window.speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(state.sentences[state.idx]);u.lang='tr-TR';u.rate=parseFloat($('rateSel').value)||1;let v=state.voices.find(x=>x.name===$('voiceSel').value);if(v)u.voice=v;u.onend=()=>{if(state.playing&&state.idx<state.sentences.length-1){next();setTimeout(speakCurrent,120)}else state.playing=false};window.speechSynthesis.speak(u)}
function play(){state.playing=true;speakCurrent()}function stop(){state.playing=false;window.speechSynthesis.cancel()}
function loadVoices(){state.voices=speechSynthesis.getVoices().filter(v=>/tr|turkish/i.test(v.lang+' '+v.name));if(!state.voices.length)state.voices=speechSynthesis.getVoices();$('voiceSel').innerHTML=state.voices.map(v=>`<option>${v.name}</option>`).join('')}
function saveLocal(){try{localStorage.setItem(DATA_KEY,JSON.stringify({version:12,issues:state.issues,at:Date.now()}));persistProgress();}catch(e){}}
function loadLocal(){try{let keys=[DATA_KEY,'hakikat_reader_data_v11','hakikat_reader_data_v10','hakikat_reader_data_v9','hakikat_reader_data_v8','hakikat_reader_data_v7','hakikat_reader_data_v6','hakikat_reader_data_v5','hakikat_reader_data_v4','hakikat_reader_data_v3','hakikat_reader_data_v2','hakikat_reader_data'];for(let k of keys){let d=JSON.parse(localStorage.getItem(k)||'{}');if(d.issues&&d.issues.length){state.issues=d.issues.map(x=>({...x,url:slugIssue(x.no)}));loadProgress();if(d.progress){state.progress={...d.progress,...state.progress};persistProgress();}renderIssues();toast('Kayıtlı veri açıldı.');return true}}}catch(e){}loadProgress();return false}
function downloadJson(){let blob=new Blob([JSON.stringify({issues:state.issues},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hakikat_dergisi_data.json';a.click();URL.revokeObjectURL(a.href)}
$('fetchBtn').onclick=loadAll;$('q').oninput=renderIssues;$('nextBtn').onclick=next;$('prevBtn').onclick=prev;$('playBtn').onclick=play;$('stopBtn').onclick=stop;$('listBtn').onclick=showListScreen;speechSynthesis.onvoiceschanged=loadVoices;loadVoices();loadProgress();if(!loadLocal()){setTimeout(loadAll,300)}
window.addEventListener('beforeunload',()=>{if(state.issue&&state.sentences.length)saveProgress();});
window.loadIssue=loadIssue;window.selectArticle=selectArticle;
</script>
</body>
</html>
