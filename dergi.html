<style>
:root{--bg:#07101f;--panel:#0d1728;--panel2:#13223a;--line:#263b5f;--txt:#edf5ff;--muted:#9fb1c8;--brand:#43ddcd;--gold:#ffc64b;--red:#a9405a;--green:#29c27f;--blue:#29406d}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#142946 0,#07101f 48%,#050914 100%);color:var(--txt);font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial}.app{height:100vh;display:grid;grid-template-columns:350px 390px 1fr;overflow:hidden}.side,.middle,.reader{min-width:0;border-right:1px solid var(--line);background:rgba(8,16,30,.72);backdrop-filter:blur(10px)}.head{padding:18px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#ffd45d,#ff892f);display:grid;place-items:center;color:#111;font-weight:900}.title h1{font-size:19px;margin:0}.title p{margin:3px 0 0;color:var(--muted);font-size:13px}.tools{padding:14px;display:grid;gap:10px}.row{display:flex;gap:8px}.inp,.sel{width:100%;border:1px solid var(--line);background:#091326;color:var(--txt);border-radius:14px;padding:12px}.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:800;color:#06101e;background:var(--gold);cursor:pointer}.btn.secondary{background:#233a66;color:white}.btn.play{background:var(--brand);color:#041316}.btn.stop{background:var(--red);color:white}.btn:disabled{opacity:.45;cursor:not-allowed}.hint{margin:0 14px 14px;padding:12px;border:1px dashed #916f18;border-radius:14px;color:#ffe596;background:#17170d;font-size:12px}.list{height:calc(100vh - 150px);overflow:auto;padding:0 14px 18px;scrollbar-width:auto}.issue{display:grid;grid-template-columns:58px 1fr;gap:12px;padding:13px;border:1px solid transparent;border-radius:16px;margin:8px 0;background:#111a2d;cursor:pointer}.issue:hover,.issue.active{border-color:var(--gold);background:#182640}.coverMini{height:92px;border-radius:10px;background:linear-gradient(150deg,#233d67,#111827);border:1px solid var(--line);display:grid;place-items:center;color:var(--gold);font-weight:900;overflow:hidden;padding:3px}.coverMini img{width:100%;height:100%;object-fit:contain;border-radius:7px;display:block;background:#07101f}.issue b{display:block}.issue small{color:var(--muted)}.issueProgress{grid-column:1/3;height:7px;background:#0a1222;border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-top:2px}.issueProgress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--gold))}.issuePct{font-size:10px;color:var(--gold);margin-top:4px}.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.chip{font-size:10px;padding:4px 7px;border-radius:999px;background:#213452;color:#c6d6ee}.middle{overflow:auto}.issueView{padding:18px}.bigCover{width:100%;min-height:360px;max-height:calc(100vh - 310px);aspect-ratio:3/4;border-radius:24px;background:linear-gradient(160deg,#1c3760,#070d19);border:1px solid var(--line);display:grid;place-items:center;text-align:center;box-shadow:0 18px 45px rgba(0,0,0,.3);overflow:hidden;padding:10px}.bigCover img{width:100%;height:100%;object-fit:contain;object-position:center;background:#07101f;border-radius:18px;display:block}.bigCover .fallback{font-size:34px;font-weight:900;color:var(--gold)}.meta{display:flex;gap:10px;margin:14px 0}.stat{flex:1;background:#15223a;border:1px solid var(--line);border-radius:14px;padding:10px}.stat small{color:var(--gold);display:block}.sectionTitle{font-size:18px;margin:18px 0 10px}.article{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101b2f;margin:8px 0;cursor:pointer}.article:hover,.article.active{border-color:var(--brand);background:#142741}.article b{display:block}.article small{color:var(--muted)}.reader{display:grid;grid-template-rows:auto minmax(0,1fr);height:100vh;overflow:hidden}.topbar{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;justify-content:space-between}.rtitle{min-width:0}.rtitle h2{margin:0;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rtitle p{margin:3px 0 0;color:var(--muted);font-size:12px}.controls{display:flex;gap:8px;align-items:center}.voice{max-width:230px}.progress{width:140px;height:8px;border:1px solid var(--line);border-radius:99px;overflow:hidden}.bar{height:100%;background:var(--brand);width:0}.content{overflow-y:scroll;overflow-x:hidden;padding:26px 34px 90px;height:100%;scrollbar-width:auto;overscroll-behavior:contain}.empty{height:100%;display:grid;place-items:center;text-align:center;color:#a9c6ef}.sentence{font-size:20px;line-height:1.75;margin:0 0 13px;padding:9px 12px;border-radius:14px;color:#e8f1ff}.sentence.done{color:#8c9ab1}.sentence.active{background:linear-gradient(90deg,rgba(255,198,75,.28),rgba(67,221,205,.1));outline:1px solid rgba(255,198,75,.5);color:white}.sentence.next{color:#dcecff}.load{position:fixed;inset:auto 20px 20px auto;background:#111a2d;border:1px solid var(--line);padding:12px 15px;border-radius:14px;color:#dbe8ff;box-shadow:0 15px 40px rgba(0,0,0,.4)}.app.catalog{grid-template-columns:350px 1fr}.app.catalog .reader{display:none}.app.catalog .middle{display:block}.backList{background:#1e355e;color:white}@media(max-width:1150px){.app{grid-template-columns:330px 1fr}.middle{display:none}}@media(max-width:720px){html,body{height:100%;overflow:hidden}.app{height:100dvh;display:block;overflow:auto;-webkit-overflow-scrolling:touch}.side,.middle,.reader{height:auto;border-right:0}.list{height:360px;-webkit-overflow-scrolling:touch}.middle{display:block}.bigCover{min-height:380px;max-height:none;aspect-ratio:3/4}.reader{min-height:650px}.topbar{display:grid}.controls{flex-wrap:wrap}.content{padding:18px;-webkit-overflow-scrolling:touch;touch-action:pan-y}.sentence{font-size:18px}.app.reading{height:100dvh;overflow:hidden}.app.reading .side,.app.reading .middle{display:none!important}.app.reading .reader{display:grid;grid-template-rows:auto minmax(0,1fr);height:100dvh;min-height:0;overflow:hidden;border-right:0}.app.reading .topbar{position:sticky;top:0;z-index:50;background:rgba(7,16,31,.96);backdrop-filter:blur(10px);box-shadow:0 8px 22px rgba(0,0,0,.35);padding:9px 10px;gap:8px}.app.reading .rtitle h2{font-size:15px;max-width:100%}.app.reading .rtitle p{font-size:11px}.app.reading .controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;align-items:center}.app.reading .controls .btn{padding:9px 6px;font-size:12px;border-radius:11px}.app.reading .voice{grid-column:1/3;max-width:none;width:100%;min-width:0}.app.reading #rateSel{grid-column:3;width:100%!important}.app.reading .progress{grid-column:4;width:100%;height:7px}.app.reading #count{grid-column:1/5;text-align:center;font-size:12px;color:var(--muted)}.app.reading .content{height:auto;min-height:0;overflow-y:auto!important;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:16px 14px 120px}.app.reading .sentence{font-size:18px;line-height:1.65;margin-bottom:10px}.app.catalog .reader{display:none}.app.catalog .side,.app.catalog .middle{display:block}}

.quick{padding:0 14px 12px;display:grid;gap:8px}.quickRow{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.quickRow .wide{grid-column:1/3}.charHelp{font-size:12px;color:var(--muted);margin:6px 0 10px}.mapPreview{border:1px solid var(--line);background:#101b2f;border-radius:14px;padding:10px;margin-top:10px;white-space:pre-wrap}.mapGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn.small{padding:9px 10px;border-radius:12px;font-size:12px}.btn.ghost{background:#15223a;color:#dcecff;border:1px solid var(--line)}.btn.gold{background:var(--gold);color:#111}.favMark{border-left:4px solid var(--gold)!important}.noteMark{box-shadow:inset 0 -2px 0 rgba(67,221,205,.65)}.sentence{cursor:pointer;position:relative;font-size:var(--readFont,20px)}.sentence.favMark::after{content:'⭐';position:absolute;right:10px;top:6px;font-size:14px}.sentence.noteMark::before{content:'📝';position:absolute;right:36px;top:6px;font-size:14px}.modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.72);display:grid;place-items:center;padding:18px}.modal.hidden{display:none}.modalBox{width:min(860px,96vw);max-height:88vh;overflow:auto;background:#0d1728;border:1px solid var(--line);border-radius:22px;box-shadow:0 30px 90px rgba(0,0,0,.55)}.modalHead{position:sticky;top:0;background:#0d1728;border-bottom:1px solid var(--line);padding:16px;display:flex;justify-content:space-between;gap:10px;align-items:center}.modalHead h2{margin:0;font-size:20px}.modalBody{padding:16px}.modalClose{background:#233a66;color:#fff;border:0;border-radius:12px;padding:9px 12px;cursor:pointer;font-weight:800}.modalItem{border:1px solid var(--line);background:#101b2f;border-radius:14px;padding:12px;margin:10px 0;cursor:pointer}.modalItem:hover{border-color:var(--brand);background:#142741}.modalItem.searchResult{cursor:default;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}.modalItem.searchResult:hover{border-color:var(--line);background:#101b2f}.modalItem.searchResult .resultText{min-width:0}.modalItem.searchResult .goBtn{min-width:84px;white-space:nowrap}.modalItem b{display:block}.modalItem small{color:var(--muted);display:block;margin-top:4px}.modalActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.textarea{width:100%;min-height:140px;border:1px solid var(--line);background:#091326;color:var(--txt);border-radius:14px;padding:12px;font:15px/1.5 system-ui}.searchBox{display:flex;gap:8px;position:sticky;top:62px;background:#0d1728;padding-bottom:12px;z-index:5}.searchBox input{flex:1}.mark{background:rgba(255,198,75,.35);border-radius:4px;padding:0 2px}.miniInfo{font-size:12px;color:var(--muted);margin-top:8px}.topbar .btn.icon{min-width:44px;padding:10px 12px}.continueBanner{margin:0 14px 12px;padding:12px;border:1px solid rgba(67,221,205,.55);border-radius:14px;background:#0b2534;color:#dff;display:none}.continueBanner b{color:var(--gold)}
@media(max-width:720px){.quickRow{grid-template-columns:repeat(2,minmax(0,1fr))}.topbar{position:sticky;top:0}.modal{padding:8px}.modalBox{max-height:94vh}.searchBox{top:58px}.app.reading .controls{grid-template-columns:repeat(4,minmax(0,1fr))}.app.reading .controls .voice{grid-column:1/3}.app.reading .controls #rateSel{grid-column:3}.app.reading .controls .progress{grid-column:4}.app.reading .controls #count{grid-column:1/5}.sentence.favMark::after,.sentence.noteMark::before{position:static;margin-left:6px}.modalItem.searchResult{grid-template-columns:1fr}.modalItem.searchResult .goBtn{width:100%}}

<body>
<div id="app" class="app catalog">
<aside class="side">
  <div class="head"><div class="logo">H</div><div class="title"><h1>Hakikat Dergisi</h1><p>Kapak, sayı, konu, makale ve sesli okuma.</p></div></div>
  <div class="tools">
    <div class="row"><input id="q" class="inp" placeholder="Sayı, tarih, konu ara..."><button id="fetchBtn" class="btn">Yenile</button></div>
  </div>
  <div id="continueBanner" class="continueBanner"></div>
  <div class="quick">
    <div class="quickRow"><button id="continueBtn" class="btn small ghost">↩ Devam Et</button><button id="archiveSearchBtn" class="btn small ghost">🔎 Metin Ara</button></div>
    <div class="quickRow"><button id="favListBtn" class="btn small ghost">⭐ Favoriler</button><button id="noteListBtn" class="btn small ghost">📝 Notlar</button></div>
    <div class="quickRow"><button id="fontDecBtn" class="btn small ghost">A- Küçült</button><button id="fontIncBtn" class="btn small ghost">A+ Büyüt</button></div>
    <div class="quickRow"><button id="charMapBtn" class="btn small ghost wide">🔤 Karakter Dönüşümleri</button></div>
  </div>
  <div id="issueList" class="list"></div>
</aside>
<section class="middle"><div id="issueView" class="issueView"><div class="empty"><div><h2>Yerel arşiv yükleniyor...</h2><p>data/index.json dosyası varsa sayılar otomatik gelir.</p></div></div></div></section>
<main class="reader">
  <div class="topbar">
    <div class="rtitle"><h2 id="readerTitle">Dergi seçiniz</h2><p id="readerSub">Makale seçildiğinde cümleler burada açılır.</p></div>
    <div class="controls"><button id="listBtn" class="btn secondary">📚 Listeye Dön</button><button id="favBtn" class="btn secondary icon" title="Bu cümleyi favoriye ekle">☆</button><button id="noteBtn" class="btn secondary icon" title="Bu cümleye not yaz">📝</button><button id="prevBtn" class="btn secondary">◀ Geri</button><button id="nextBtn" class="btn secondary">İleri ▶</button><button id="playBtn" class="btn play">Sesli Oku</button><button id="stopBtn" class="btn stop">Durdur</button><select id="voiceSel" class="sel voice"></select><select id="rateSel" class="sel" style="width:90px"><option value="0.8">0.8x</option><option value="1" selected>1x</option><option value="1.15">1.15x</option><option value="1.3">1.3x</option></select><div class="progress"><div id="bar" class="bar"></div></div><span id="count">0/0</span></div>
  </div>
  <div id="content" class="content"><div class="empty"><div><h2>Okuma ekranı hazır.</h2><p>Soldan sayı, ortadan makale seçin.</p></div></div></div>
</main>
</div>
<div id="toast" class="load" style="display:none"></div>

<div id="modal" class="modal hidden"><div class="modalBox"><div class="modalHead"><h2 id="modalTitle">Başlık</h2><button id="modalClose" class="modalClose">Kapat</button></div><div id="modalBody" class="modalBody"></div></div></div>
<script>
const BASE='https://www.hakikat.com';
const DATA_KEY='hakikat_reader_data_local_v1';
const PROGRESS_KEY='hakikat_reader_progress_v11';
const FAV_KEY='hakikat_reader_favorites_v1';
const NOTES_KEY='hakikat_reader_notes_v1';
const SETTINGS_KEY='hakikat_reader_settings_v1';
const CUSTOM_CHAR_KEY='hakikat_reader_custom_chars_v1';
const STATIC_DATA_URL='data/index.json';
async function loadIssueJson(issue){
  if(issue.articles && issue.articles.length) return issue;
  if(!issue.contentFile) return issue;
  const r=await fetch(issue.contentFile+'?v='+Date.now(),{cache:'no-store'});
  if(!r.ok) throw new Error(issue.contentFile+' okunamadı');
  const d=await r.json();
  Object.assign(issue,d);
  normalizeIssueTextFields(issue);
  issue.url=issue.url||slugIssue(issue.no);
  issue.cover=issue.cover||d.cover||knownCover(issue.no)||'';
  return issue;
}
const COVER_FALLBACKS={
  393:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-393-kapak-haki-72846771-66fd-4027-930f-1a01d4c53e10.jpg',
  392:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-392-kapak-tera-9289f36f-a2c8-4bbf-82f6-bf4b8d3c9823.jpg',
  391:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-391-kapak-iran-45ed5ad6-7dde-4657-8c7a-3b3aed55e3ee.jpg',
  390:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-390-kapak-ulvi-d236422d-9266-49f5-a4b0-eda67fd5572b.jpg',
  389:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-389-kapak-insa-54d30582-d642-4d78-aecf-2f78268019e5.jpg',
  388:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-388-kapak-hate-a9a5ee6f-5a1a-4704-92fc-8797a457b456.jpg'
};
function knownCover(no){return COVER_FALLBACKS[String(no)]||COVER_FALLBACKS[Number(no)]||''}
const state={issues:[],issue:null,articles:[],article:null,sentences:[],idx:0,playing:false,voices:[],progress:{},favorites:{},notes:{},settings:{readFont:20},customChars:{},suppressScroll:false};
const $=id=>document.getElementById(id);
function toast(t){$('toast').textContent=t;$('toast').style.display='block';clearTimeout(window._tt);window._tt=setTimeout(()=>$('toast').style.display='none',3500)}

// Türkçe karakter düzeltme: eski veya hatalı kodlanmış metinlerdeki bozuk harfleri düzeltir.
// Varsayılan listeye ek olarak kullanıcı kendi dönüşüm listesini Ayarlar > Karakter Dönüşümleri bölümünden ekleyebilir.
const DEFAULT_CHAR_REPLACEMENTS={
  'Ý':'İ','ý':'ı','Ð':'Ğ','ð':'ğ','Þ':'Ş','þ':'ş',
  'Ã‡':'Ç','Ã§':'ç','Ã–':'Ö','Ã¶':'ö','Ãœ':'Ü','Ã¼':'ü',
  'Ä°':'İ','Ä±':'ı','Äž':'Ğ','ÄŸ':'ğ','Åž':'Ş','ÅŸ':'ş',
  'â€™':'’','â€˜':'‘','â€œ':'“','â€':'”','â€�':'”','â€“':'–','â€”':'—','â€¦':'…',
  '&nbsp;':' ','&#160;':' ','&quot;':'"','&#39;':'’','&amp;':'&'
};
function getAllCharReplacements(){return {...DEFAULT_CHAR_REPLACEMENTS,...(state.customChars||{})}}
function applyCharReplacements(s){
  const replacements=getAllCharReplacements();
  const entries=Object.entries(replacements).filter(([bad])=>bad!==''&&bad!=null).sort((a,b)=>String(b[0]).length-String(a[0]).length);
  for(const [bad,good] of entries) s=s.split(String(bad)).join(String(good));
  return s;
}
function normalizeTurkishText(s){
  if(s==null) return '';
  s=String(s);
  s=applyCharReplacements(s);
  return s.normalize ? s.normalize('NFC') : s;
}
function parseCharMapText(txt){
  const out={};
  String(txt||'').split(/\r?\n/).forEach(line=>{
    line=line.trim();
    if(!line || line.startsWith('#')) return;
    let i=line.indexOf('=');
    if(i<0) i=line.indexOf('→');
    if(i<0) i=line.indexOf('->');
    if(i<0) return;
    let bad=line.slice(0,i).trim();
    let good=line.slice(i+(line[i]==='='?1:(line[i]==='→'?1:2))).trim();
    if(!bad) return;
    out[bad]=good;
  });
  return out;
}
function charMapToText(map){return Object.entries(map||{}).map(([bad,good])=>`${bad}=${good}`).join('\n')}
function loadCustomChars(){try{state.customChars=JSON.parse(localStorage.getItem(CUSTOM_CHAR_KEY)||'{}')||{}}catch(e){state.customChars={}}}
function saveCustomChars(){localStorage.setItem(CUSTOM_CHAR_KEY,JSON.stringify(state.customChars||{}))}
function reNormalizeLoadedText(){
  state.issues=(state.issues||[]).map(x=>normalizeIssueTextFields(x));
  if(state.issue) state.issue=normalizeIssueTextFields(state.issue);
  if(state.issue&&state.article!=null&&state.issue.articles&&state.issue.articles[state.article]){
    const keep=state.idx;
    const a=state.issue.articles[state.article];
    state.sentences=splitSentences(a.text||'');
    state.idx=Math.min(keep,Math.max(0,state.sentences.length-1));
    $('readerTitle').textContent=a.title||$('readerTitle').textContent;
    $('readerSub').textContent=normalizeTurkishText(state.issue.title||'')+' • '+state.sentences.length+' cümle';
    renderContent();
  }
  renderIssues();
  renderIssue();
}
function showCharMapSettings(){
  const text=charMapToText(state.customChars);
  showModal('Karakter Dönüşümleri',`
    <p class="charHelp">Buraya kendi düzeltmelerini satır satır yaz. Biçim: <b>bozuk=doğru</b>. Örnek: <code>µ=ü</code> veya <code>Ã‡=Ç</code></p>
    <textarea id="charMapText" class="textarea" placeholder="Ý=İ\ný=ı\nþ=ş">${esc(text)}</textarea>
    <div class="mapGrid">
      <textarea id="charTest" class="textarea" style="min-height:90px" placeholder="Deneme metni yaz..."></textarea>
      <div id="charPreview" class="mapPreview">Önizleme burada görünür.</div>
    </div>
    <div class="modalActions">
      <button class="btn play" onclick="saveCharMapSettings()">Kaydet ve Uygula</button>
      <button class="btn secondary" onclick="resetCharMapSettings()">Kullanıcı Listesini Temizle</button>
      <button class="btn secondary" onclick="previewCharMapSettings()">Önizle</button>
    </div>
    <p class="miniInfo">Not: Varsayılan dönüşümler programda kalır. Buradaki liste sadece senin eklediğin özel dönüşümlerdir.</p>
  `);
}
function previewCharMapSettings(){
  const old=state.customChars;
  const tmp=parseCharMapText(($('charMapText')&&$('charMapText').value)||'');
  state.customChars=tmp;
  const sample=(($('charTest')&&$('charTest').value)||'Ýman, þükür, Ã¼mmet, ÅŸefkat');
  $('charPreview').textContent=normalizeTurkishText(sample);
  state.customChars=old;
}
function saveCharMapSettings(){
  state.customChars=parseCharMapText(($('charMapText')&&$('charMapText').value)||'');
  saveCustomChars();
  reNormalizeLoadedText();
  saveLocal();
  closeModal();
  toast('Karakter dönüşümleri kaydedildi ve uygulandı.');
}
function resetCharMapSettings(){
  if(!confirm('Kullanıcı tarafından eklenen karakter dönüşümleri temizlensin mi?')) return;
  state.customChars={};
  saveCustomChars();
  reNormalizeLoadedText();
  saveLocal();
  closeModal();
  toast('Kullanıcı dönüşüm listesi temizlendi.');
}
function normalizeForSearch(s){return normalizeTurkishText(s).toLocaleLowerCase('tr-TR')}
function normalizeForSpeech(s){
  return normalizeTurkishText(s)
    .replace(/[Ââ]/g,'a').replace(/[Îî]/g,'i').replace(/[Ûû]/g,'u')
    .replace(/[“”„]/g,'"').replace(/[‘’`´]/g,"'")
    .replace(/\s+/g,' ').trim();
}
function normalizeIssueTextFields(issue){
  if(!issue) return issue;
  if(issue.title) issue.title=normalizeTurkishText(issue.title);
  if(issue.date) issue.date=normalizeTurkishText(issue.date);
  if(issue.topics) issue.topics=issue.topics.map(normalizeTurkishText);
  if(issue.articles) issue.articles=issue.articles.map(a=>({
    ...a,
    title:normalizeTurkishText(a.title||''),
    text:normalizeTurkishText(a.text||'')
  }));
  return issue;
}

function extractCover(md,issue){
  let candidates=[]; const no=String(issue.no);

    || candidates.find(x=>x.includes(no))

function saveProgress(){if(!state.issue||!state.sentences.length)return;state.progress[String(state.issue.no)]={idx:state.idx,total:state.sentences.length,title:state.issue.title||'',at:Date.now()};persistProgress();renderIssues();updateContinueBanner()}
function loadProgress(){state.progress={};const keys=[PROGRESS_KEY,'hakikat_reader_progress_v10','hakikat_reader_progress_v8','hakikat_reader_progress_v7','hakikat_reader_progress_v6'];for(const k of keys){try{const d=JSON.parse(localStorage.getItem(k)||'{}')||{};state.progress={...d,...state.progress};}catch(e){}}}
function mergeIssuesFresh(fresh){const old=new Map((state.issues||[]).map(x=>[x.no,x]));return fresh.map(x=>{const o=old.get(x.no)||{};return {...o,...x,cover:x.cover||o.cover||knownCover(x.no)||'',articles:o.articles||x.articles||null,raw:o.raw||''};});}
async function loadStaticIndex(){
  const r=await fetch(STATIC_DATA_URL+'?v=' + Date.now(),{cache:'no-store'});
  if(!r.ok) throw new Error('data/index.json bulunamadı');
  const d=await r.json();
  const issues=(d.issues||[]).map(x=>normalizeIssueTextFields({...x,no:Number(x.no),url:x.url||slugIssue(x.no),cover:x.cover||x.localCover||knownCover(x.no)||'',contentFile:x.contentFile||('data/'+x.no+'.json')}));
  if(!issues.length) throw new Error('data/index.json boş');
  state.issues=mergeIssuesFresh(issues);
  loadProgress();saveLocal();renderIssues();updateContinueBanner();
  toast('Yerel JSON yüklendi: '+issues.length+' sayı. Kapaklar JSON’dan geliyor.');
  return true;
}
async function loadAll(){
  try{
    toast('Yerel data/index.json aranıyor...');
    await loadStaticIndex();
    return;
  }catch(e){
    loadProgress();
    loadLocal();
    $('issueView').innerHTML='<div class="empty"><div><h2>Yerel veri bulunamadı.</h2><p>Önce bilgisayarda <b>guncelle.bat</b> çalıştırın. Sonra oluşan <b>data</b> ve <b>kapaklar</b> klasörlerini GitHub’a yükleyin.</p></div></div>';
    toast('data/index.json bulunamadı veya boş. guncelle.bat çalıştırılmalı.');
  }
}
async function loadIssue(no){
  let issue=state.issues.find(x=>Number(x.no)===Number(no));if(!issue)return;
  issue.url=issue.url||slugIssue(no);
  stop();state.issue=issue;state.article=null;state.sentences=[];state.idx=0;
  renderIssues();renderIssue();
  $('readerTitle').textContent=`${issue.no}.SAYI, ${issue.date}`;
  $('readerSub').textContent='İçerik yükleniyor...';
  $('content').innerHTML='<div class="empty"><div><h2>İçerik yükleniyor...</h2><p>Yerel arşiv dosyası okunuyor.</p></div></div>';
  try{
    if(issue.contentFile || (issue.articles&&issue.articles.length)){
      await loadIssueJson(issue);
      state.issue=issue;
      renderIssues();renderIssue();saveLocal();selectArticle(0);
      toast('Yerel içerik hazır.');
      return;
    }
    toast(no+'. sayı internetten çekiliyor...');
    let md=await getText(issue.url);
    let full=parseIssuePage(md,issue);
    if(!full.cover){toast('Kapak resmi aranıyor...'); full.cover=knownCover(no)||await findCoverFromHtml(issue);}
    Object.assign(issue,full);state.issue=issue;
    renderIssues();renderIssue();saveLocal();selectArticle(0);
    toast('İçerik hazır.');
  }catch(e){
    state.article=null;state.sentences=[];renderIssue();
    $('readerTitle').textContent=`${issue.no}.SAYI, ${issue.date}`;
    $('readerSub').textContent='Çekilemedi';
    $('content').innerHTML='<div class="empty"><div><h2>Bu sayı açılamadı</h2><p>Önce bilgisayarda guncelle.bat çalıştırıp data dosyalarını üretin. Hata: '+String(e.message||e)+'</p></div></div>';
    toast('Sayı açılamadı: '+e.message);
  }
}
function selectArticle(i){state.article=i;let a=state.issue.articles[i];a.title=normalizeTurkishText(a.title||'');a.text=normalizeTurkishText(a.text||'');state.sentences=splitSentences(a.text);let saved=state.progress[state.issue.no];state.idx=(saved&&saved.total===state.sentences.length)?Math.min(saved.idx,state.sentences.length-1):0;$('readerTitle').textContent=a.title;$('readerSub').textContent=normalizeTurkishText(state.issue.title)+' • '+state.sentences.length+' cümle';renderIssue();renderContent();showReaderScreen();}
function next(){if(state.idx<state.sentences.length-1){state.idx++;renderContent();}}
function prev(){if(state.idx>0){state.idx--;renderContent();}}

function showListScreen(){stop();$('app').classList.add('catalog');$('app').classList.remove('reading');window.scrollTo({top:0,left:0,behavior:'smooth'});let list=$('issueList');if(list)list.scrollIntoView({block:'start',behavior:'smooth'});}
function showReaderScreen(){$('app').classList.remove('catalog');$('app').classList.add('reading');window.scrollTo({top:0,left:0,behavior:'smooth'});}
function speakCurrent(){if(!state.sentences.length)return;window.speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(normalizeForSpeech(state.sentences[state.idx]));u.lang='tr-TR';u.rate=parseFloat($('rateSel').value)||1;let v=state.voices.find(x=>x.name===$('voiceSel').value);if(v)u.voice=v;u.onend=()=>{if(state.playing&&state.idx<state.sentences.length-1){next();setTimeout(speakCurrent,120)}else state.playing=false};window.speechSynthesis.speak(u)}
function play(){state.playing=true;speakCurrent()}function stop(){state.playing=false;window.speechSynthesis.cancel()}
function loadVoices(){state.voices=speechSynthesis.getVoices().filter(v=>/tr|turkish/i.test(v.lang+' '+v.name));if(!state.voices.length)state.voices=speechSynthesis.getVoices();$('voiceSel').innerHTML=state.voices.map(v=>`<option>${v.name}</option>`).join('')}
function saveLocal(){try{localStorage.setItem(DATA_KEY,JSON.stringify({version:13,issues:state.issues,at:Date.now()}));persistProgress();}catch(e){}}
function loadLocal(){try{let keys=[DATA_KEY,'hakikat_reader_data_v11','hakikat_reader_data_v10','hakikat_reader_data_v9','hakikat_reader_data_v8','hakikat_reader_data_v7','hakikat_reader_data_v6','hakikat_reader_data_v5','hakikat_reader_data_v4','hakikat_reader_data_v3','hakikat_reader_data_v2','hakikat_reader_data'];for(let k of keys){let d=JSON.parse(localStorage.getItem(k)||'{}');if(d.issues&&d.issues.length){state.issues=d.issues.map(x=>normalizeIssueTextFields({...x,url:slugIssue(x.no)}));loadProgress();if(d.progress){state.progress={...d.progress,...state.progress};persistProgress();}renderIssues();updateContinueBanner();toast('Kayıtlı veri açıldı.');return true}}}catch(e){}loadProgress();return false}
function downloadJson(){let blob=new Blob([JSON.stringify({issues:state.issues},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hakikat_dergisi_data.json';a.click();URL.revokeObjectURL(a.href)}
$('fetchBtn').onclick=loadAll;$('q').oninput=renderIssues;$('nextBtn').onclick=next;$('prevBtn').onclick=prev;$('playBtn').onclick=play;$('stopBtn').onclick=stop;$('listBtn').onclick=showListScreen;$('favBtn').onclick=()=>toggleFavorite();$('noteBtn').onclick=()=>openNote();$('continueBtn').onclick=continueLast;$('archiveSearchBtn').onclick=showArchiveSearch;$('favListBtn').onclick=showFavorites;$('noteListBtn').onclick=showNotes;$('fontDecBtn').onclick=()=>setFont(-1);$('fontIncBtn').onclick=()=>setFont(1);$('charMapBtn').onclick=showCharMapSettings;$('modalClose').onclick=closeModal;$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});let __scrollTimer=null;$('content').addEventListener('scroll',()=>{clearTimeout(__scrollTimer);__scrollTimer=setTimeout(updateFromScroll,120)},{passive:true});speechSynthesis.onvoiceschanged=loadVoices;loadVoices();loadExtras();loadProgress();if(!loadLocal()){setTimeout(loadAll,300)}else updateContinueBanner()
window.addEventListener('beforeunload',()=>{if(state.issue&&state.sentences.length)saveProgress();});
window.loadIssue=loadIssue;window.selectArticle=selectArticle;window.continueLast=continueLast;window.goToSaved=goToSaved;window.saveCurrentNote=saveCurrentNote;window.deleteCurrentNote=deleteCurrentNote;window.runArchiveSearch=runArchiveSearch;window.goToSearchResult=goToSearchResult;window.jumpSentence=jumpSentence;window.showCharMapSettings=showCharMapSettings;window.saveCharMapSettings=saveCharMapSettings;window.resetCharMapSettings=resetCharMapSettings;window.previewCharMapSettings=previewCharMapSettings;
</script>
