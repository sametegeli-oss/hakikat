<body>

<script>
const BASE='https://www.hakikat.com';
const DATA_KEY='hakikat_reader_data_local_v1';
const PROGRESS_KEY='hakikat_reader_progress_v11';
const FAV_KEY='hakikat_reader_favorites_v1';
const NOTES_KEY='hakikat_reader_notes_v1';
const SETTINGS_KEY='hakikat_reader_settings_v1';
const CUSTOM_CHAR_KEY='hakikat_reader_custom_chars_v1';
const DAILY_KEY='hakikat_reader_daily_v1';
const BACKUP_VERSION=2;
const STATIC_DATA_URL='data/index.json';
async function loadIssueJson(issue){
  if(issue.articles && issue.articles.length) return issue;
  if(!issue.contentFile) return issue;
  const r=await fetch(issue.contentFile+'?v='+Date.now(),{cache:'no-store'});
  if(!r.ok) throw new Error(issue.contentFile+' okunamadı');
  const d=await r.json();
  Object.assign(issue,d);
  normalizeIssueTextFields(issue);
  issue.url=issue.url||slugIssue(issue.no);
  issue.cover=issue.cover||d.cover||knownCover(issue.no)||'';
  return issue;
}
const COVER_FALLBACKS={
  393:'https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-393-kapak-haki-72846771-66fd-4027-930f-1a01d4c53e10.jpg',

// Varsayılan listeye ek olarak kullanıcı kendi dönüşüm listesini Ayarlar > Karakter Dönüşümleri bölümünden ekleyebilir.
const DEFAULT_CHAR_REPLACEMENTS={
  'Ý':'İ','ý':'ı','Ð':'Ğ','ð':'ğ','Þ':'Ş','þ':'ş',
  'Ã‡':'Ç','Ã§':'ç','Ã–':'Ö','Ã¶':'ö','Ãœ':'Ü','Ã¼':'ü',
  'Ä°':'İ','Ä±':'ı','Äž':'Ğ','ÄŸ':'ğ','Åž':'Ş','ÅŸ':'ş',
  'â€™':'’','â€˜':'‘','â€œ':'“','â€':'”','â€�':'”','â€“':'–','â€”':'—','â€¦':'…',
  '&nbsp;':' ','&#160;':' ','&quot;':'"','&#39;':'’','&amp;':'&'
};
function getAllCharReplacements(){return {...DEFAULT_CHAR_REPLACEMENTS,...(state.customChars||{})}}
function applyCharReplacements(s){
  const replacements=getAllCharReplacements();
  const entries=Object.entries(replacements).filter(([bad])=>bad!==''&&bad!=null).sort((a,b)=>String(b[0]).length-String(a[0]).length);
  for(const [bad,good] of entries) s=s.split(String(bad)).join(String(good));
  return s;
}
function normalizeTurkishText(s){
  if(s==null) return '';
  s=String(s);
  s=applyCharReplacements(s);
  return s.normalize ? s.normalize('NFC') : s;
}
function parseCharMapText(txt){
  const out={};
  String(txt||'').split(/\r?\n/).forEach(line=>{
    line=line.trim();
    if(!line || line.startsWith('#')) return;
    let i=line.indexOf('=');
    if(i<0) i=line.indexOf('→');
    if(i<0) i=line.indexOf('->');
    if(i<0) return;
    let bad=line.slice(0,i).trim();
    let good=line.slice(i+(line[i]==='='?1:(line[i]==='→'?1:2))).trim();
    if(!bad) return;
    out[bad]=good;
  });
  return out;
}
function charMapToText(map){return Object.entries(map||{}).map(([bad,good])=>`${bad}=${good}`).join('\n')}

function reNormalizeLoadedText(){

    state.idx=Math.min(keep,Math.max(0,state.sentences.length-1));

function normalizeForSpeech(s){

    .replace(/[Ââ]/g,'a').replace(/[Îî]/g,'i').replace(/[Ûû]/g,'u')
    .replace(/[“”„]/g,'"').replace(/[‘’`´]/g,"'")

}
function normalizeIssueTextFields(issue){
  if(!issue) return issue;
  if(issue.title) issue.title=normalizeTurkishText(issue.title);
  if(issue.date) issue.date=normalizeTurkishText(issue.date);
  if(issue.topics) issue.topics=issue.topics.map(normalizeTurkishText);
  if(issue.articles) issue.articles=issue.articles.map(a=>({

}

function hi(text,term){let safe=esc(text);if(!term)return safe;let t=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return safe.replace(new RegExp(t,'gi'),m=>`<span class="mark">${m}</span>`)}
function issueSearchStatusOk(issue,status){let p=state.progress[String(issue.no)]||{};let pct=p.total?((p.idx+1)/p.total):0;if(status==='unread')return !p.total;if(status==='partial')return p.total&&pct<1;if(status==='done')return p.total&&pct>=1;return true}
function getIssueSearchArticles(issue){
  let arr=[];
  if(issue&&Array.isArray(issue.articles)&&issue.articles.length) arr=issue.articles;
  else if(issue&&issue.article) arr=[issue.article];
  if(!arr.length){
    const txt=(issue&&((issue.text||issue.raw||issue.content||issue.body)))||'';
    if(txt) arr=[{title:(issue&&issue.title)||'',text:txt}];
  }
  return arr.map(a=>({title:normalizeTurkishText(a.title||(issue&&issue.title)||''),text:normalizeTurkishText(a.text||a.content||a.body||'')})).filter(a=>a.title||a.text);
}
async function prepareIssueForSearch(issue){
  if(!issue) return issue;
  issue.contentFile=issue.contentFile||('data/'+issue.no+'.json');
  if(issue.articles&&issue.articles.length) return normalizeIssueTextFields(issue);
  try{await loadIssueJson(issue);return normalizeIssueTextFields(issue);}catch(e1){
    try{
      const r=await fetch(('data/'+issue.no+'.json')+'?v='+Date.now(),{cache:'no-store'});
      if(r.ok){const d=await r.json();Object.assign(issue,d);issue.contentFile=issue.contentFile||('data/'+issue.no+'.json');return normalizeIssueTextFields(issue);}
    }catch(e2){}
  }
  return issue;
}
function pushSearchResult(results,item,seen){
  const key=`${item.no}:${item.articleIndex||0}:${item.idx||0}:${String(item.text||'').slice(0,40)}`;
  if(seen.has(key)||results.length>=500) return;
  seen.add(key);results.push(item);
}
async function runArchiveSearch(){
  let term=($('archiveTerm').value||'').trim();
  if(term.length<2){$('searchStatus').textContent='En az 2 harf yazın.';return}
  let lower=normalizeForSearch(term);
  let scope=($('searchScope')&&$('searchScope').value)||'all';
  let status=($('searchStatusFilter')&&$('searchStatusFilter').value)||'all';
  let results=[],seen=new Set(),fail=0,searched=0;
  $('searchResults').innerHTML='';
  $('searchStatus').textContent='Arama hazırlanıyor...';
  if(scope==='fav'){
    Object.values(state.favorites||{}).forEach(x=>{if(normalizeForSearch((x.text||'')+' '+(x.title||'')).includes(lower))pushSearchResult(results,{...x,date:x.date||'',title:x.title||'',text:x.text||'',articleIndex:0},seen)});
  }
  else if(scope==='notes'){
    Object.values(state.notes||{}).forEach(x=>{if(normalizeForSearch((x.text||'')+' '+(x.title||'')+' '+(x.note||'')).includes(lower))pushSearchResult(results,{...x,date:x.date||'',title:x.title||'',text:(x.text||'')+' — Not: '+(x.note||''),articleIndex:0},seen)});
  }
  else{
    const list=(state.issues||[]).slice();
    for(let n=0;n<list.length;n++){
      let issue=list[n];
      if(!issueSearchStatusOk(issue,status)) continue;
      searched++;
      $('searchStatus').textContent=`Tüm arşiv taranıyor: ${n+1}/${list.length} — bulunan ${results.length}`;
      try{
        await prepareIssueForSearch(issue);
        const articles=getIssueSearchArticles(issue);
        if(!articles.length){fail++;continue;}
        articles.forEach((a,articleIndex)=>{
          const titleBlob=(issue.title||'')+' '+(a.title||'')+' '+((issue.topics||[]).join(' '));
          if((scope==='all'||scope==='title')&&normalizeForSearch(titleBlob).includes(lower)){
            pushSearchResult(results,{no:issue.no,date:issue.date,title:a.title||issue.title,idx:0,articleIndex,text:(issue.title||a.title||'Başlık sonucu')},seen);
          }
          if(scope==='all'||scope==='body'){
            let sent=splitSentences(a.text||'');
            if(!sent.length && a.text) sent=clean(a.text).split(/\n{2,}|(?<=[.!?…])\s+/).map(x=>x.trim()).filter(x=>x.length>8);
            sent.forEach((s,i)=>{if(normalizeForSearch(s).includes(lower))pushSearchResult(results,{no:issue.no,date:issue.date,title:a.title||issue.title,idx:i,articleIndex,text:s},seen);});
          }
        });
      }catch(e){fail++;}
      if(results.length>=500) break;
    }
    saveLocal();
  }
  results=results.slice(0,500);
  const extra=fail?` ${fail} sayı dosyası okunamadı; data klasörünün GitHub'a tam yüklendiğini kontrol edin.`:'';
  $('searchStatus').textContent=`${results.length} sonuç gösteriliyor. ${searched?searched+' sayı tarandı. ':''}Git düğmesine basınca ilgili sayı ve cümle açılır.${extra}`;
  $('searchResults').innerHTML=results.length?results.map(r=>`
    <div class="modalItem searchResult">
      <div class="resultText">
        <b>${r.no}. SAYI, ${esc(r.date||'')} — ${(Number(r.idx)||0)+1}. cümle</b>
        <small>${esc(r.title||'')}</small>
        <p>${hi(r.text||'',term)}</p>
      </div>
      <button class="btn small play goBtn" onclick="goToSearchResult(${Number(r.no)},${Number(r.idx)||0},${Number(r.articleIndex)||0})">Git</button>
    </div>`).join(''):'<p>Sonuç bulunamadı. Tüm sayılarda arama için <b>data/393.json, data/392.json...</b> dosyalarının GitHub’da yüklü olması gerekir.</p>';
}


function todayKey(){return new Date().toISOString().slice(0,10)}
function weekKey(d){let dt=new Date(d);let onejan=new Date(dt.getFullYear(),0,1);let week=Math.ceil((((dt-onejan)/86400000)+onejan.getDay()+1)/7);return dt.getFullYear()+'-W'+week}

async function fetchWithTimeout(u,ms=12000){

}
async function fetchAnyText(urls){let last;for(const u of urls){try{let r=await fetchWithTimeout(u,12000);if(r.ok){let t=await r.text();if(t&&t.length>200)return t}}catch(e){last=e}}throw last||new Error('proxy okunamadı')}
function normalizeImageUrl(u){

}
function extractCoverMap(txt){
  const map={}; txt=txt||'';
  // Hakikat listesinde kapak linki genellikle "Büyüt" bağlantısıdır:
  // https://www.hakikat.com/Upload/Dosyalar/resim-jpg/hakikat-dergisi-393-kapak-....jpg
  const re=/https?:\/\/[^\s"'()<>]+hakikat-dergisi-(\d{1,3})-kapak[^\s"'()<>]*?\.(?:jpg|jpeg|png|webp)(?:\?[^\s"'()<>]*)?/gi;
  let m;
  while((m=re.exec(txt))){ map[String(+m[1])]=normalizeImageUrl(m[0]); }
  return map;
}

async function findCoverFromHtml(issue){
  // Kapak resmi metin proxy ile bulunur; resmin kendisi doğrudan <img src> ile yüklenir.
  try{
    const html=await fetchAnyText(htmlProxyUrls(issue.url));
    const found=[];
    const imgRe=/<img\b[^>]*?(?:src|data-src)=["']([^"']+)["'][^>]*>/gi;
    let m;
    while((m=imgRe.exec(html))){
      const tag=m[0]; const src=absUrl(m[1]);
      if(!src) continue;
      const hay=(tag+' '+src).toLowerCase();
      if(hay.includes('hakikat-dergisi') || hay.includes('kapak') || hay.includes(String(issue.no))) found.push(src);
    }
    for(const mm of html.matchAll(/https?:\/\/[^\s"'()<>]+\.(?:jpg|jpeg|png|webp)(?:\?[^\s"'()<>]*)?/gi)){
      const src=absUrl(mm[0]); const low=src.toLowerCase();
      if(low.includes('hakikat-dergisi') || low.includes('kapak') || src.includes(String(issue.no))) found.push(src);
    }
    const uniq=[...new Set(found)];
    return uniq.find(x=>x.toLowerCase().includes('kapak')&&x.includes(String(issue.no)))
        || uniq.find(x=>x.includes(String(issue.no)))
        || uniq.find(x=>x.toLowerCase().includes('kapak'))
        || uniq[0] || '';
  }catch(e){return ''}
}

function absUrl(u){if(!u)return '';u=u.replace(/&amp;/g,'&').trim();if(u.startsWith('//'))return 'https:'+u;if(u.startsWith('/'))return BASE+u;if(u.startsWith('http://'))return u.replace('http://','https://');return u}
function extractCover(md,issue){
  let candidates=[]; const no=String(issue.no);
  // Jina metninde şu yapı geliyor: [Image: Hakikat Dergisi 392.SAYI](https://...jpg?format=webx...)
  // Query string içinde parantez yoksa tamamı alınır; &amp; temizlenir.
  const imgLink=/\[[^\]]*(?:Image|Resim|kapak|Hakikat Dergisi|SAYI)[^\]]*\]\((https?:\/\/[^\s)]+?\.(?:jpg|jpeg|png|webp)(?:\?[^\s)]*)?)\)/gi;
  for(const m of md.matchAll(imgLink)) candidates.push(m[1]);
  const mdImg=/!\[[^\]]*\]\((https?:\/\/[^\s)]+?\.(?:jpg|jpeg|png|webp)(?:\?[^\s)]*)?)\)/gi;
  for(const m of md.matchAll(mdImg)) candidates.push(m[1]);
  const direct=/https?:\/\/[^\s"'<>]+?\.(?:jpg|jpeg|png|webp)(?:\?[^\s"'<>]*)?/gi;
  for(const m of md.matchAll(direct)) candidates.push(m[0]);
  candidates=[...new Set(candidates.map(normalizeImageUrl).filter(Boolean))];
  return candidates.find(x=>x.toLowerCase().includes('kapak') && x.includes(no))
    || candidates.find(x=>x.toLowerCase().includes('hakikat-dergisi') && x.includes(no))
    || candidates.find(x=>x.toLowerCase().includes('kapak'))
    || candidates.find(x=>x.includes(no))
    || candidates[0] || '';
}
function isReferenceTitle(l){return /^\(?[A-Za-zÇĞİÖŞÜçğıöşüÂÎÛâîû'’\-\s]+:\s*\d+[\-–]?\d*\)?$/.test(l.trim())}
function stripSiteNoise(lines){
  const bad=/^(Title:|URL Source:|Markdown Content:|Hakikat Yayıncılık|ÖMER ÖNGÜT|HAKİKAT YAYINCILIK|HAKİKAT DERGİSİ|HAKİKAT MEDYA|HAKİKAT KIRTASİYE|HAKİKAT TAKVİMLERİ|Arama Yap|HAKKIMIZDA|DUYURULAR|YABANCI DİLDEKİ|KÜNYE|TEMSİLCİLİKLERİMİZ|KIRTASİYE BAYİLERİMİZ|İLETİŞİM|Ana Sayfa|Büyüt|Önceki \d+\.SAYI|Sonraki \d+\.SAYI|SAYFAYA DEVAM|Yazar Seçiniz|Sayı Seçiniz|Tüm Sayılar)$/i;
  return lines.map(clean).filter(l=>l && !bad.test(l) && !/^Image:/i.test(l) && !/^\* \* \*$/.test(l));
}
function parseIssuePage(md,issue){
  let rawLines=md.split(/\n+/).map(x=>x.trim()).filter(Boolean);
  let lines=stripSiteNoise(rawLines);
  let title=`${issue.no}.SAYI, ${issue.date}`;
  let cover=issue.cover||extractCover(md,issue)||knownCover(issue.no)||'';

  // Orta bölüm metin parçalamaz: her sayı tek ana metin olarak tutulur.
  let contentStart=0;
  let ownTitleIndex=lines.findIndex(l=>new RegExp('^'+issue.no+'\\.SAYI','i').test(l));
  let besmeleIndex=lines.findIndex(l=>/Bismillahirrahmanirrahim/i.test(l));
  if(ownTitleIndex>=0) contentStart=ownTitleIndex+1;
  if(besmeleIndex>=0) contentStart=Math.min(contentStart||besmeleIndex, besmeleIndex);

  let bodyLines=lines.slice(contentStart).filter(l=>{
    if(/^Hakikat \d+\. Sayı/i.test(l)) return false;
    if(/^Başyazı ve Makaleler$/i.test(l)) return false;
    if(/^Başyazıyı Oku$/i.test(l)) return false;
    if(/^Başyazı$/i.test(l)) return false;
    if(/^İsmail Yavuz$/i.test(l)) return false;
    if(/^https?:\/\//i.test(l)) return false;
    return true;
  });
  let fullText=bodyLines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
  if(!fullText) fullText=lines.join('\n');
  let mainTitle=`${issue.no}.SAYI, ${issue.date}`;
  let articles=[{title:mainTitle,text:fullText,kind:'full'}];
  return normalizeIssueTextFields({...issue,title:mainTitle,cover,topics:[mainTitle],articles,raw:md});
}

async function loadSearchIndex(){
  if(state.searchIndexReady) return state.searchIndex;
  state.searchIndexReady=true;
  try{
    const r=await fetch('data/search-index.json?v='+Date.now(),{cache:'no-store'});
    if(r.ok){
      const d=await r.json();
      const items=Array.isArray(d.items)?d.items:[];
      state.searchIndex=items.map(x=>({
        no:Number(x.no),date:normalizeTurkishText(x.date||''),title:normalizeTurkishText(x.title||''),idx:Number(x.idx)||0,articleIndex:Number(x.articleIndex)||0,text:normalizeTurkishText(x.text||'')
      }));
      return state.searchIndex;
    }
  }catch(e){}
  state.searchIndex=null;
  return null;
}
async function runArchiveSearch(){
  let term=($('archiveTerm').value||'').trim();
  if(term.length<2){$('searchStatus').textContent='En az 2 harf yazın.';return}
  let lower=normalizeForSearch(term);
  let scope=($('searchScope')&&$('searchScope').value)||'all';
  let status=($('searchStatusFilter')&&$('searchStatusFilter').value)||'all';
  let results=[],seen=new Set(),fail=0,searched=0;
  $('searchResults').innerHTML='';
  $('searchStatus').textContent='Arama hazırlanıyor...';
  if(scope==='fav'){
    Object.values(state.favorites||{}).forEach(x=>{if(normalizeForSearch((x.text||'')+' '+(x.title||'')).includes(lower))pushSearchResult(results,{...x,date:x.date||'',title:x.title||'',text:x.text||'',articleIndex:0},seen)});
  } else if(scope==='notes'){
    Object.values(state.notes||{}).forEach(x=>{if(normalizeForSearch((x.text||'')+' '+(x.title||'')+' '+(x.note||'')).includes(lower))pushSearchResult(results,{...x,date:x.date||'',title:x.title||'',text:(x.text||'')+' — Not: '+(x.note||''),articleIndex:0},seen)});
  } else {
    const idx=await loadSearchIndex();
    if(idx && (scope==='all'||scope==='body') && status==='all'){
      $('searchStatus').textContent='Hızlı arama indeksi taranıyor...';
      for(const x of idx){
        if(normalizeForSearch((scope==='body'?x.text:(x.title+' '+x.text))).includes(lower)) pushSearchResult(results,x,seen);
        if(results.length>=500) break;
      }
      searched='arama indeksi';
    } else {
      const list=(state.issues||[]).slice();
      for(let n=0;n<list.length;n++){
        let issue=list[n];
        if(!issueSearchStatusOk(issue,status)) continue;
        searched++;
        $('searchStatus').textContent=`Tüm arşiv taranıyor: ${n+1}/${list.length} — bulunan ${results.length}`;
        try{
          await prepareIssueForSearch(issue);
          const articles=getIssueSearchArticles(issue);
          if(!articles.length){fail++;continue;}
          articles.forEach((a,articleIndex)=>{
            const titleBlob=(issue.title||'')+' '+(a.title||'')+' '+((issue.topics||[]).join(' '));
            if((scope==='all'||scope==='title')&&normalizeForSearch(titleBlob).includes(lower)){
              pushSearchResult(results,{no:issue.no,date:issue.date,title:a.title||issue.title,idx:0,articleIndex,text:(issue.title||a.title||'Başlık sonucu')},seen);
            }
            if(scope==='all'||scope==='body'){
              let sent=splitSentences(a.text||'');
              if(!sent.length && a.text) sent=clean(a.text).split(/\n{2,}|(?<=[.!?…])\s+/).map(x=>x.trim()).filter(x=>x.length>8);
              sent.forEach((s,i)=>{if(normalizeForSearch(s).includes(lower))pushSearchResult(results,{no:issue.no,date:issue.date,title:a.title||issue.title,idx:i,articleIndex,text:s},seen);});
            }
          });
        }catch(e){fail++;}
        if(results.length>=500) break;
      }
      saveLocal();
    }
  }
  results=results.slice(0,500);
  const extra=fail?` ${fail} sayı dosyası okunamadı; data klasörünün GitHub'a tam yüklendiğini kontrol edin.`:'';
  $('searchStatus').textContent=`${results.length} sonuç gösteriliyor. ${searched?searched+' tarandı. ':''}${state.searchIndex?'Hızlı arama indeksi kullanıldı. ':''}Git düğmesine basınca ilgili sayı ve cümle açılır.${extra}`;
  $('searchResults').innerHTML=results.length?results.map(r=>`
    <div class="modalItem searchResult">
      <div class="resultText">
        <b>${r.no}. SAYI, ${esc(r.date||'')} — ${(Number(r.idx)||0)+1}. cümle</b>
        <small>${esc(r.title||'')}</small>
        <p>${hi(r.text||'',term)}</p>
      </div>
      <button class="btn small play goBtn" onclick="goToSearchResult(${Number(r.no)},${Number(r.idx)||0},${Number(r.articleIndex)||0})">Git</button>
    </div>`).join(''):'<p>Sonuç bulunamadı. Tüm sayılarda arama için <b>data/*.json</b> dosyaları veya <b>data/search-index.json</b> yüklü olmalı.</p>';
}
