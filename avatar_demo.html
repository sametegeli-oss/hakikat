<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DilAvatar Erkek Demo</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#020617;
      color:#e5e7eb;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .box{
      width:min(92vw,360px);
      background:#0b1120;
      border:1px solid rgba(148,163,184,.25);
      border-radius:24px;
      padding:22px;
      text-align:center;
    }
    button{
      border:0;
      border-radius:16px;
      background:#2563eb;
      color:white;
      font-weight:900;
      padding:12px 16px;
      margin:6px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="avatarHost"></div>
    <button onclick="DilAvatar.speakText('merhaba bugün İngilizce çalışıyoruz', 3200)">Konuştur</button>
    <button onclick="DilAvatar.thinking(true)">Düşün</button>
    <button onclick="DilAvatar.stop(); DilAvatar.thinking(false)">Dur</button>
    <p>Detaylı ayar için <b>avatar_ayar.html</b> dosyasını aç.</p>
  </div>

  <script src="./avatar.js"></script>
  <script>
    DilAvatar.mount("avatarHost");
  </script>
</body>
</html>
