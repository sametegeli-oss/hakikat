<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DilAvatar Demo</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#020617;
      color:#e5e7eb;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .box{
      width:min(92vw,380px);
      background:#0b1120;
      border:1px solid rgba(148,163,184,.25);
      border-radius:24px;
      padding:22px;
      text-align:center;
    }
    button{
      border:0;
      border-radius:16px;
      background:#2563eb;
      color:white;
      font-weight:900;
      padding:12px 16px;
      margin:6px;
      cursor:pointer;
    }
    .warn{
      display:none;
      margin:12px 0;
      padding:12px;
      border-radius:12px;
      background:#7f1d1d;
      color:#fff;
      font-weight:800;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="avatarHost"></div>
    <div id="avatarWarn" class="warn">avatar.js yüklenemedi. /dilharita/avatar.js dosyasını GitHub'a yükle.</div>
    <button onclick="DilAvatar.speakText('merhaba bugün İngilizce çalışıyoruz', 3200)">Konuştur</button>
    <button onclick="DilAvatar.thinking(true)">Düşün</button>
    <button onclick="DilAvatar.stop(); DilAvatar.thinking(false)">Dur</button>
  </div>

  <!-- GitHub Pages için ortak avatar dosyası -->
  <script src="/dilharita/avatar.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function(){
      if (!window.DilAvatar) {
        document.getElementById("avatarWarn").style.display = "block";
        return;
      }
      DilAvatar.mount("avatarHost");
    });
  </script>
</body>
</html>
